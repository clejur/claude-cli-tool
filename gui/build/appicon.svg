<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="terminal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d3748"/>
      <stop offset="100%" stop-color="#1a202c"/>
    </linearGradient>
    <linearGradient id="star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E07A5F"/>
      <stop offset="100%" stop-color="#F4A261"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="80" ry="80" fill="url(#bg)"/>

  <!-- Terminal window -->
  <rect x="72" y="100" width="368" height="312" rx="16" ry="16" fill="url(#terminal)" stroke="#4a5568" stroke-width="2"/>

  <!-- Terminal title bar -->
  <rect x="72" y="100" width="368" height="40" rx="16" ry="16" fill="#2d3748"/>
  <rect x="72" y="124" width="368" height="16" fill="#2d3748"/>

  <!-- Title bar dots -->
  <circle cx="100" cy="120" r="7" fill="#fc8181"/>
  <circle cx="124" cy="120" r="7" fill="#fbd38d"/>
  <circle cx="148" cy="120" r="7" fill="#68d391"/>

  <!-- Terminal prompt lines (subtle) -->
  <rect x="100" y="168" width="80" height="4" rx="2" fill="#4a5568" opacity="0.6"/>
  <rect x="188" y="168" width="120" height="4" rx="2" fill="#68d391" opacity="0.4"/>

  <rect x="100" y="192" width="60" height="4" rx="2" fill="#4a5568" opacity="0.6"/>
  <rect x="168" y="192" width="160" height="4" rx="2" fill="#63b3ed" opacity="0.4"/>

  <rect x="100" y="216" width="90" height="4" rx="2" fill="#4a5568" opacity="0.6"/>

  <!-- Six-pointed asterisk ✳ (main star symbol) -->
  <g filter="url(#glow)" transform="translate(256, 310)">
    <!-- Vertical bar -->
    <rect x="-10" y="-60" width="20" height="120" rx="10" fill="url(#star)"/>
    <!-- 60-degree bar -->
    <rect x="-10" y="-60" width="20" height="120" rx="10" fill="url(#star)" transform="rotate(60)"/>
    <!-- 120-degree bar -->
    <rect x="-10" y="-60" width="20" height="120" rx="10" fill="url(#star)" transform="rotate(120)"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="14" fill="#fff" opacity="0.9"/>
  </g>

  <!-- Small launch arrow (bottom-right corner) -->
  <g transform="translate(380, 360)" opacity="0.8">
    <path d="M0,24 L12,-12 L24,24 L12,16 Z" fill="#E07A5F"/>
    <rect x="9" y="20" width="6" height="12" rx="3" fill="#E07A5F" opacity="0.6"/>
  </g>
</svg>
